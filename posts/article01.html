        <h1>0001　向島（むかいしま）で見つけた猫</h1>
        <p><time datetime="2025-08-01">2025年8月1日</time></p>
        <img src="../images/IMG20250717125645.jpg" alt="猫" style="max-width: 100%;">
        <div style="line-height: 1.8;">
            <p>しまなみ海道の尾道寄り、1個目の島、向島（むかいしま）で見つけた猫です。

猫はリトリートの仙人と言っても過言ではないくらい。

見ていると、

真っ黒ではなく、茶色の毛並みや首の下あたりに白い部分もあり、

雅（みやび）な雰囲気を醸しつつ、目力のある見飽きないヤツでした。

また会えたら報告しましょうぃね。</p>
        </div>
