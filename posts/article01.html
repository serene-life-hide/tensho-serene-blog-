        <h1>0001　向島（むかいしま）で見つけた猫</h1>
        <time datetime="2024-04-25">2025.08.01</time>
        
        <img src="../images/IMG20250717125645.jpg" alt="猫の写真" class="post-image">
        
        <div class="content">
            <p>しまなみ海道の尾道寄り、1個目の島、向島（むかいしま）で見つけた猫です。</p>

<p>猫はリトリートの仙人と言っても過言ではないくらい。</p>

<p>見ていると、真っ黒ではなく、

茶色の毛並みや首の下あたりに白い部分もあり、

雅（みやび）な雰囲気を醸しつつ、目力のある見飽きないヤツでした。</p>

<p>また会えたら報告しましょうぃね。</p>
